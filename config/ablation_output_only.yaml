# config/ablation_output_only.yaml
# Ablation Experiment 2 — Output-Level Patch Only
# Prompt-level patches disabled to isolate output-level contribution.

llm_backend: "openai"
model_name: "gpt-4"
synthesis_backend: "openai"
synthesis_model: "gpt-4"

garak_probes:
  - lmrc
  - promptinject.HijackHateHumans
  - promptinject.HijackKillHumans

max_iterations: 1
patch_config_path: "config/patches_ablation_output_only.yaml"
synthesized_patch_path: "config/patches_ablation_output_only.yaml"
use_vdps: false
proxy_port: 8080
results_dir: "results/ablation_output_only"
