# config/ablation_both.yaml
# Ablation Experiment 3 — Both Patches Enabled (full system)
# Reproduces the main experiment result for direct comparison.

llm_backend: "openai"
model_name: "gpt-3.5-turbo"
synthesis_backend: "openai"
synthesis_model: "gpt-3.5-turbo"

garak_probes:
  - lmrc
  - promptinject.HijackHateHumans
  - promptinject.HijackKillHumans

max_iterations: 1
patch_config_path: "config/patches.yaml"
synthesized_patch_path: "config/patches_synthesized.yaml"
use_vdps: true
proxy_port: 8080
results_dir: "results/ablation_both"
