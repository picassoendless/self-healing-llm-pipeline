# config/pipeline.yaml

llm_backend: "openai"
model_name: "gpt-4"

synthesis_backend: "openai"
synthesis_model: "gpt-4"

garak_probes:
  - lmrc
  - promptinject.HijackHateHumans
  - promptinject.HijackKillHumans

max_iterations: 1
patch_config_path: "config/patches.yaml"
synthesized_patch_path: "config/patches_synthesized.yaml"
use_vdps: true
proxy_port: 8080
results_dir: "results"
