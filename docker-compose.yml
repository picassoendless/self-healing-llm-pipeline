version: "3.9"

services:
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./results:/app/results          # persist scan results
      - ./config:/app/config            # mount config for easy editing
    command: python run.py --config config/pipeline.yaml

  # Run ablation: prompt-level patches only
  ablation-prompt:
    build: .
    env_file: .env
    volumes:
      - ./results:/app/results
    command: python run.py --config config/ablation_prompt_only.yaml

  # Run ablation: output-level patches only
  ablation-output:
    build: .
    env_file: .env
    volumes:
      - ./results:/app/results
    command: python run.py --config config/ablation_output_only.yaml

  # Run ablation: both patches (full system)
  ablation-both:
    build: .
    env_file: .env
    volumes:
      - ./results:/app/results
    command: python run.py --config config/ablation_both.yaml
